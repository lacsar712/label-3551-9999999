{% extends "base.html" %}

{% block title %}确认删除 - 智慧物业平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body text-center p-5">
                <h1 class="text-danger mb-4"><i class="bi bi-exclamation-triangle-fill"></i>警告</h1>
                <h3 class="mt-3">确认删除吗？</h3>
                <p class="text-muted">您确定要删除项 "<strong>{{ object }}</strong>" 吗？<br>此操作不可恢复，并可能导致有关联的数据一同被删除！</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">确认删除</button>
                    <a href="javascript:history.back()" class="btn btn-secondary px-4 ms-2">取消返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
