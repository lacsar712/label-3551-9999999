{% extends "base.html" %}

{% block title %}楼栋管理 - 智慧物业平台{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">楼栋管理</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'building_add' %}" class="btn btn-sm btn-primary">
            + 新增楼栋
        </a>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col"># ID</th>
                        <th scope="col">所属楼盘</th>
                        <th scope="col">楼栋名称</th>
                        <th scope="col" class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for building in buildings %}
                    <tr>
                        <td>{{ building.id }}</td>
                        <td>{{ building.estate.name }}</td>
                        <td>{{ building.name }}</td>
                        <td class="text-end">
                            <a href="{% url 'building_edit' building.id %}"
                                class="btn btn-sm btn-outline-primary">编辑</a>
                            <a href="{% url 'building_delete' building.id %}"
                                class="btn btn-sm btn-outline-danger">删除</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">目前还没有录入任何楼栋信息</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
